name: Build Hydrapulse ISO

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cpio gzip \
            grub-pc-bin grub-common grub2-common xorriso mtools \
            linux-image-generic

      - name: Compile init (static)
        run: make

      - name: Verify init is Linux ELF
        run: file init

      - name: Build initramfs
        run: |
          chmod +x mkinitramfs.sh
          bash mkinitramfs.sh

      - name: Prepare ISO structure
        run: |
          KERNEL=$(ls /boot/vmlinuz-* | head -1)
          echo "Using kernel: $KERNEL"
          mkdir -p iso/boot/grub
          sudo cp "$KERNEL" iso/boot/vmlinuz-linux
          cp initramfs.cpio.gz iso/boot/
          cp grub.cfg iso/boot/grub/

      - name: Build ISO
        run: grub-mkrescue -o hydrapulse.iso iso/

      - name: Show ISO info
        run: ls -lh hydrapulse.iso

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: hydrapulse-iso
          path: hydrapulse.iso
