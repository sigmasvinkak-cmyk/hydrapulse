# -------------------------------------------------
# /boot/grub/grub.cfg   –   простой GRUB‑меню
# -------------------------------------------------
set timeout=5
set default=0

menuentry "Hydrapulse (minimal)" {
    # Путь к ядру (можно заменить на ваш vmlinuz-linux)
    linux /boot/vmlinuz-linux root=UUID=YOUR_ROOT_UUID \
          ro quiet splash init=/init
    initrd /boot/initramfs.cpio.gz
}
